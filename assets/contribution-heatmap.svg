<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 200" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace; }
    </style>
  </defs>
  <rect x="0.5" y="0.5" width="619" height="199" rx="6" fill="#0D1117" stroke="#1E293B" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="620" height="28" rx="6" fill="#161B22"/>
  <rect x="0" y="14" width="620" height="14" fill="#161B22"/>
  <text x="310" y="19" text-anchor="middle" fill="#8B949E" font-size="10" font-family="monospace">contributions — activity [last-6-weeks]</text>

  <!-- Simulated contribution grid - 6 weeks x 7 days -->
  <!-- Color legend: 0=#161B22, 1=#0E4429, 2=#006D32, 3=#26A641, 4=#39D353 -->
  <g transform="translate(24, 44)">
    <!-- Month label -->
    <text x="0" y="-4" fill="#8B949E" font-size="8" font-family="monospace">Jun            Jul</text>

    <!-- Generate a 6-week heatmap (42 cells, 6 cols x 7 rows) -->
    <!-- Week 1 (Jun 1-7) -->
    <rect x="0" y="4" width="10" height="10" rx="2" fill="#0E4429"/>
    <rect x="0" y="18" width="10" height="10" rx="2" fill="#161B22"/>
    <rect x="0" y="32" width="10" height="10" rx="2" fill="#26A641"/>
    <rect x="0" y="46" width="10" height="10" rx="2" fill="#0E4429"/>
    <rect x="0" y="60" width="10" height="10" rx="2" fill="#006D32"/>
    <rect x="0" y="74" width="10" height="10" rx="2" fill="#26A641"/>
    <rect x="0" y="88" width="10" height="10" rx="2" fill="#161B22"/>

    <!-- Week 2 (Jun 8-14) -->
    <rect x="14" y="4" width="10" height="10" rx="2" fill="#26A641"/>
    <rect x="14" y="18" width="10" height="10" rx="2" fill="#39D353"/>
    <rect x="14" y="32" width="10" height="10" rx="2" fill="#006D32"/>
    <rect x="14" y="46" width="10" height="10" rx="2" fill="#0E4429"/>
    <rect x="14" y="60" width="10" height="10" rx="2" fill="#26A641"/>
    <rect x="14" y="74" width="10" height="10" rx="2" fill="#006D32"/>
    <rect x="14" y="88" width="10" height="10" rx="2" fill="#0E4429"/>

    <!-- Week 3 (Jun 15-21) -->
    <rect x="28" y="4" width="10" height="10" rx="2" fill="#0E4429"/>
    <rect x="28" y="18" width="10" height="10" rx="2" fill="#006D32"/>
    <rect x="28" y="32" width="10" height="10" rx="2" fill="#26A641"/>
    <rect x="28" y="46" width="10" height="10" rx="2" fill="#39D353"/>
    <rect x="28" y="60" width="10" height="10" rx="2" fill="#006D32"/>
    <rect x="28" y="74" width="10" height="10" rx="2" fill="#0E4429"/>
    <rect x="28" y="88" width="10" height="10" rx="2" fill="#26A641"/>

    <!-- Week 4 (Jun 22-28) -->
    <rect x="42" y="4" width="10" height="10" rx="2" fill="#006D32"/>
    <rect x="42" y="18" width="10" height="10" rx="2" fill="#26A641"/>
    <rect x="42" y="32" width="10" height="10" rx="2" fill="#0E4429"/>
    <rect x="42" y="46" width="10" height="10" rx="2" fill="#006D32"/>
    <rect x="42" y="60" width="10" height="10" rx="2" fill="#161B22"/>
    <rect x="42" y="74" width="10" height="10" rx="2" fill="#39D353"/>
    <rect x="42" y="88" width="10" height="10" rx="2" fill="#26A641"/>

    <!-- Week 5 (Jun 29 - Jul 5) -->
    <rect x="56" y="4" width="10" height="10" rx="2" fill="#39D353"/>
    <rect x="56" y="18" width="10" height="10" rx="2" fill="#006D32"/>
    <rect x="56" y="32" width="10" height="10" rx="2" fill="#26A641"/>
    <rect x="56" y="46" width="10" height="10" rx="2" fill="#0E4429"/>
    <rect x="56" y="60" width="10" height="10" rx="2" fill="#26A641"/>
    <rect x="56" y="74" width="10" height="10" rx="2" fill="#006D32"/>
    <rect x="56" y="88" width="10" height="10" rx="2" fill="#39D353"/>

    <!-- Week 6 (Jul 6-12) -->
    <rect x="70" y="4" width="10" height="10" rx="2" fill="#161B22"/>
    <rect x="70" y="18" width="10" height="10" rx="2" fill="#26A641"/>
    <rect x="70" y="32" width="10" height="10" rx="2" fill="#0E4429"/>
    <rect x="70" y="46" width="10" height="10" rx="2" fill="#006D32"/>
    <rect x="70" y="60" width="10" height="10" rx="2" fill="#26A641"/>
    <rect x="70" y="74" width="10" height="10" rx="2" fill="#39D353"/>
    <rect x="70" y="88" width="10" height="10" rx="2" fill="#006D32"/>

    <!-- Day labels -->
    <text x="-8" y="10" fill="#8B949E" font-size="7" font-family="monospace" text-anchor="end">Mon</text>
    <text x="-8" y="24" fill="#8B949E" font-size="7" font-family="monospace" text-anchor="end">Tue</text>
    <text x="-8" y="38" fill="#8B949E" font-size="7" font-family="monospace" text-anchor="end">Wed</text>
    <text x="-8" y="52" fill="#8B949E" font-size="7" font-family="monospace" text-anchor="end">Thu</text>
    <text x="-8" y="66" fill="#8B949E" font-size="7" font-family="monospace" text-anchor="end">Fri</text>
    <text x="-8" y="80" fill="#8B949E" font-size="7" font-family="monospace" text-anchor="end">Sat</text>
    <text x="-8" y="94" fill="#8B949E" font-size="7" font-family="monospace" text-anchor="end">Sun</text>

    <!-- Legend -->
    <text x="100" y="40" fill="#8B949E" font-size="8" font-family="monospace">Less</text>
    <rect x="120" y="32" width="10" height="10" rx="2" fill="#161B22"/>
    <rect x="134" y="32" width="10" height="10" rx="2" fill="#0E4429"/>
    <rect x="148" y="32" width="10" height="10" rx="2" fill="#006D32"/>
    <rect x="162" y="32" width="10" height="10" rx="2" fill="#26A641"/>
    <rect x="176" y="32" width="10" height="10" rx="2" fill="#39D353"/>
    <text x="190" y="40" fill="#8B949E" font-size="8" font-family="monospace">More</text>
  </g>

  <!-- Right side: Stats summary column -->
  <line x1="290" y1="38" x2="290" y2="180" stroke="#1E293B" stroke-width="1" stroke-dasharray="3,3"/>

  <text x="310" y="56" fill="#22C55E" font-size="10" font-weight="700" font-family="monospace">CONTRIBUTION_STATS</text>

  <text x="310" y="78" fill="#8B949E" font-size="9" font-family="monospace">Total Commits</text>
  <text x="530" y="78" fill="#E2E8F0" font-size="9" font-family="monospace" text-anchor="end">247 ▲</text>

  <text x="310" y="98" fill="#8B949E" font-size="9" font-family="monospace">Pull Requests</text>
  <text x="530" y="98" fill="#E2E8F0" font-size="9" font-family="monospace" text-anchor="end">32 ▲</text>

  <text x="310" y="118" fill="#8B949E" font-size="9" font-family="monospace">Issues Opened</text>
  <text x="530" y="118" fill="#E2E8F0" font-size="9" font-family="monospace" text-anchor="end">18</text>

  <text x="310" y="138" fill="#8B949E" font-size="9" font-family="monospace">Repos Contributed To</text>
  <text x="530" y="138" fill="#E2E8F0" font-size="9" font-family="monospace" text-anchor="end">8</text>

  <text x="310" y="158" fill="#8B949E" font-size="9" font-family="monospace">Coding Streak</text>
  <text x="530" y="158" fill="#22C55E" font-size="9" font-family="monospace" text-anchor="end">14 days</text>

  <text x="310" y="178" fill="#8B949E" font-size="9" font-family="monospace">Longest Streak</text>
  <text x="530" y="178" fill="#4ADE80" font-size="9" font-family="monospace" text-anchor="end">21 days</text>
</svg>
