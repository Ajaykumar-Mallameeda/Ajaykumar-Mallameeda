<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 168" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace; }
    </style>
    <linearGradient id="borderGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22C55E;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#22C55E;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#22C55E;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="scanline" x1="0" y1="0" x2="0" y2="4" spreadMethod="repeat">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0.03"/>
      <stop offset="50%" style="stop-color:#000000;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="620" height="168" rx="8" fill="#0D1117"/>
  <!-- Border glow -->
  <rect x="0.5" y="0.5" width="619" height="167" rx="8" fill="none" stroke="url(#borderGlow)" stroke-width="1"/>
  <!-- Scanline overlay -->
  <rect width="620" height="168" rx="8" fill="url(#scanline)" opacity="0.5"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="620" height="26" rx="8" fill="#161B22"/>
  <rect x="0" y="18" width="620" height="8" fill="#161B22"/>
  <!-- Window dots -->
  <circle cx="16" cy="13" r="4" fill="#FF5F56"/>
  <circle cx="32" cy="13" r="4" fill="#FFBD2E"/>
  <circle cx="48" cy="13" r="4" fill="#27C93F"/>
  <!-- Title -->
  <text x="310" y="18" text-anchor="middle" fill="#8B949E" font-size="10" font-family="monospace">zsh — ajaykumar@github:~/profile</text>

  <!-- ASCII Art "A M" monogram block -->
  <text x="20" y="48" fill="#22C55E" font-size="10" font-weight="700" xml:space="preserve" font-family="monospace">  █████  ███   ██ ███████</text>
  <text x="20" y="62" fill="#22C55E" font-size="10" font-weight="700" xml:space="preserve" font-family="monospace"> ██   ██ ████  ██    ██</text>
  <text x="20" y="76" fill="#22C55E" font-size="10" font-weight="700" xml:space="preserve" font-family="monospace"> ███████ ██ ██ ██    ██</text>
  <text x="20" y="90" fill="#22C55E" font-size="10" font-weight="700" xml:space="preserve" font-family="monospace"> ██   ██ ██  ████    ██</text>
  <text x="20" y="104" fill="#22C55E" font-size="10" font-weight="700" xml:space="preserve" font-family="monospace"> ██   ██ ██   ███    ██</text>

  <!-- Separator line -->
  <line x1="175" y1="38" x2="175" y2="114" stroke="#1E293B" stroke-width="1"/>

  <!-- Neofetch-style system info -->
  <text x="190" y="48" fill="#4ADE80" font-size="11" font-family="monospace" font-weight="700">ajaykumar@github</text>
  <text x="190" y="64" fill="#8B949E" font-size="10" font-family="monospace">──────────────</text>
  <text x="190" y="78" fill="#8B949E" font-size="10" font-family="monospace"><tspan fill="#22C55E">OS</tspan>:         CSE @ IIT Palakkad</text>
  <text x="190" y="92" fill="#8B949E" font-size="10" font-family="monospace"><tspan fill="#22C55E">ROLE</tspan>:       Software Engineer</text>
  <text x="190" y="106" fill="#8B949E" font-size="10" font-family="monospace"><tspan fill="#22C55E">LOCALE</tspan>:     Palakkad, Kerala, IN</text>
  <text x="190" y="120" fill="#8B949E" font-size="10" font-family="monospace"><tspan fill="#22C55E">UPTIME</tspan>:     3yr of continuous building</text>
  <text x="190" y="134" fill="#8B949E" font-size="10" font-family="monospace"><tspan fill="#22C55E">SHELL</tspan>:      AI · Backend · Distributed Systems</text>
  <text x="190" y="148" fill="#8B949E" font-size="10" font-family="monospace"><tspan fill="#22C55E">STATUS</tspan>:     <tspan fill="#22C55E">●</tspan> actively building | open to roles</text>

  <!-- Terminal prompt at bottom -->
  <text x="20" y="130" fill="#16A34A" font-size="9" font-family="monospace">$</text>
  <text x="34" y="130" fill="#8B949E" font-size="9" font-family="monospace">cat /etc/profile</text>
  <text x="20" y="144" fill="#16A34A" font-size="9" font-family="monospace">$</text>
  <text x="34" y="144" fill="#8B949E" font-size="9" font-family="monospace">Building strong foundations through practical engineering</text>
</svg>
